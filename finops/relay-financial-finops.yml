description: >-
  FinOps view of Relay spend. Relay does not bill usage-based API consumption
  because it has no public API. Cost is a flat monthly software subscription
  (Starter free, Grow $30/mo, Scale $90/mo) bundled with business banking;
  some banking activities (for example, outgoing wires or expedited transfers
  beyond plan allotments) may carry per-transaction fees set by the platform
  and partner bank. This artifact frames those subscription and transaction
  costs in FinOps terms.
notes: >-
  Subscription prices reflect Relay's public pricing page as of 2026-06-20.
  Relay markets "$0 hidden fees" but specific per-transaction banking fees
  (wires, expedited transfers) should be verified on the pricing and support
  pages during reconciliation. There is no API metering to track.
