meters:
- name: subscription_fee
  description: Flat monthly software subscription per plan (Starter / Grow / Scale).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: transaction_fees
  description: Per-transaction banking fees beyond plan allotments (e.g., outgoing wires, expedited / same-day ACH transfers).
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - transaction_type
principles:
- name: Visibility
  description: Track the monthly Relay subscription tier and any per-transaction banking fees against budget.
- name: Allocation
  description: Use Relay's multiple checking accounts to envelope and allocate cash by purpose, team, or cost center.
- name: Optimization
  description: Match the plan tier to actual usage; higher tiers raise savings APY and card cash-back and add free same-day ACH allotments, which can offset the subscription cost.
- name: Accountability
  description: Assign account/card ownership and review subscription tier plus transaction fees periodically.
