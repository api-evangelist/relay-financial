limits:
- name: Public API Rate Limit
  scope: not applicable
  metric: not applicable
  limit: no public API documented
  notes: Relay does not expose a public developer API; no HTTP rate limits are published.
policies:
- name: No Public API
  description: >-
    As of the review date Relay publishes no developer API and therefore no API
    rate-limiting or quota policy. Product-tier feature limits are governed by
    subscription plan, not API throttling.
