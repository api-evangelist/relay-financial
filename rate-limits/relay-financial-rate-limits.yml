description: >-
  Relay does not publish a public developer API, so there is no documented API
  rate-limiting, quota, or throttling policy to reconcile. Any operational
  limits that exist are product-level (for example, the number of checking
  accounts per plan, batch payment sizes, or same-day ACH allotments) rather
  than HTTP API rate limits. This artifact is unreconciled and records the
  absence of a public API rate-limit policy.
notes: >-
  No API rate-limit documentation exists as of 2026-06-20 because Relay has no
  public API. Product-tier limits (checking-account counts, same-day ACH
  allotments) are captured in the plans artifact, not here. Revisit if Relay
  launches a developer or partner API.
